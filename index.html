<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Principal</title>
    <style>
        body {
            background-color: #0b111e;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        /* Estilo do botão/hyperlink */
        .btn-link {
            display: inline-block;
            padding: 12px 24px;
            color: #00d2ff;
            border: 2px solid #00d2ff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-link:hover {
            background-color: #00d2ff;
            color: #0b111e;
        }
    </style>
</head>
<body>

    <a href="explicacoes.html" class="btn-link">Ver Explicações a Fundo</a>

</body>
</html>
